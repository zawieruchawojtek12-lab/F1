        ];

        const standings = [
            { pos: 1, driver: 'Kimi Antonelli', team: 'Mercedes', points: 201 },
            { pos: 2, driver: 'Lewis Hamilton', team: 'Ferrari', points: 157 },
            { pos: 3, driver: 'George Russell', team: 'Mercedes', points: 143 },
            { pos: 4, driver: 'Charles Leclerc', team: 'Ferrari', points: 114 },
            { pos: 5, driver: 'Lando Norris', team: 'McLaren', points: 96 },
            { pos: 6, driver: 'Oscar Piastri', team: 'McLaren', points: 79 },
            { pos: 7, driver: 'Max Verstappen', team: 'Red Bull', points: 64 },
            { pos: 8, driver: 'Pierre Gasly', team: 'Alpine', points: 48 }
        ];

        let currentRace = null;

        function initRacesList() {
            const racesList = document.getElementById('racesList');
            racesList.innerHTML = '';
            races.forEach(race => {
                const raceEl = document.createElement('div');
                const hasData = race.completed || race.hasQualifying;
                raceEl.className = `race-item ${hasData ? 'completed' : 'upcoming'}`;
                let badges = '<span class="event-badge qual">K</span>';
                badges += ' <span class="event-badge race">W</span>';
                raceEl.innerHTML = `<div class="race-name">${race.name}<div style="display: flex; gap: 5px;">${badges}</div></div><div class="race-date">${race.location} • ${race.dateRange}</div>`;
                raceEl.onclick = () => showResults(race);
                racesList.appendChild(raceEl);
            });
        }

        function showResults(race) {
            if (!race.completed && !race.hasQualifying) {
                alert('Dane tego wyścigu nie są jeszcze dostępne.');
                return;
            }
            currentRace = race;
            document.getElementById('modalTitle').textContent = race.name;
            const tabsContainer = document.getElementById('sessionTabs');
            tabsContainer.innerHTML = '';
            
            const btnQual = document.createElement('button');
            btnQual.className = 'session-tab active';
            btnQual.textContent = 'Kwalifikacje';
            btnQual.onclick = (e) => switchSession('qual', e.target);
            tabsContainer.appendChild(btnQual);

            if (race.sessions.race && race.sessions.race.length > 0) {
                const btnRace = document.createElement('button');
                btnRace.className = 'session-tab';
                btnRace.textContent = 'Wyścig';
                btnRace.onclick = (e) => switchSession('race', e.target);
                tabsContainer.appendChild(btnRace);
            }

            populateTables(race);
            showModal();
        }

        function populateTables(race) {
            const qualTable = document.getElementById('qualTable');
            qualTable.innerHTML = '<tr><th>Poz.</th><th>Kierowca</th><th>Zespół</th><th>Czas</th></tr>';
            race.sessions.qualifying.forEach(r => {
                const row = qualTable.insertRow();
                row.innerHTML = `<td><strong>${r.pos}</strong></td><td>${r.driver}</td><td>${r.team}</td><td>${r.time}</td>`;
            });

            if (race.sessions.race && race.sessions.race.length > 0) {
                const racePodium = document.getElementById('racePodium');
                racePodium.innerHTML = '';
                race.sessions.race.filter(r => r.pos !== 'DNF' && r.pos !== 'DNS').slice(0, 3).forEach((r, idx) => {
                    const medals = ['🥇', '🥈', '🥉'];
                    const pos = document.createElement('div');
                    pos.className = `podium-position ${['first', 'second', 'third'][idx]}`;
                    pos.innerHTML = `<div class="medal">${medals[idx]}</div><div class="position-number">${r.pos}</div><div class="driver-name">${r.driver}</div><div class="team-name">${r.team}</div>`;
                    racePodium.appendChild(pos);
                });

                const raceTable = document.getElementById('raceTable');
                raceTable.innerHTML = '<tr><th>Poz.</th><th>Kierowca</th><th>Zespół</th><th>Status</th></tr>';
                race.sessions.race.forEach(r => {
                    const row = raceTable.insertRow();
                    if (r.pos === 'DNF' || r.pos === 'DNS') {
                        row.innerHTML = `<td class="dnf-cell"><strong>${r.pos}</strong></td><td>${r.driver}</td><td>${r.team}</td><td class="dnf-cell">${r.time}</td>`;
                    } else {
                        row.innerHTML = `<td><strong>${r.pos}</strong></td><td>${r.driver}</td><td>${r.team}</td><td>${r.time}</td>`;
                    }
                });
                document.getElementById('raceSession').style.display = 'block';
            } else {
                document.getElementById('raceSession').style.display = 'none';
            }
        }

        function switchSession(session, button) {
            document.querySelectorAll('.session-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.session-content').forEach(c => c.classList.remove('active'));
            button.classList.add('active');
            if (session === 'qual') document.getElementById('qualSession').classList.add('active');
            else if (session === 'race') document.getElementById('raceSession').classList.add('active');
        }

        function showModal() {
            document.getElementById('resultsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('resultsModal').classList.remove('active');
        }

        function switchTab(e, tab) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            if (tab === 'results') {
                document.getElementById('resultsTab').style.display = 'block';
                document.getElementById('standingsTab').style.display = 'none';
                showLatestResults();
            } else {
                document.getElementById('resultsTab').style.display = 'none';
                document.getElementById('standingsTab').style.display = 'block';
                showStandings();
            }
        }

        function showLatestResults() {
            const latestResults = document.getElementById('latestResults');
            const lastRace = races.filter(r => r.completed).pop();
            if (lastRace && lastRace.sessions.race.length > 0) {
                const raceResults = lastRace.sessions.race.filter(r => r.pos !== 'DNF' && r.pos !== 'DNS');
                latestResults.innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <strong style="color: #dc0000;">Ostatni Wyścig:</strong>
                        <div style="font-size: 0.95em; color: #666;">${lastRace.name}</div>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 2.5em; margin-bottom: 10px;">🏁</div>
                        <div style="font-size: 1.3em; font-weight: bold; color: #dc0000;">${raceResults[0].driver}</div>
                        <div style="color: #666;">${raceResults[0].team}</div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                            <div style="background: #f0f0f0; padding: 10px; border-radius: 5px;">
                                <div style="font-size: 0.85em; color: #666;">2. miejsce</div>
                                <div style="font-weight: bold; margin-top: 5px;">${raceResults[1].driver}</div>
                            </div>
                            <div style="background: #f0f0f0; padding: 10px; border-radius: 5px;">
                                <div style="font-size: 0.85em; color: #666;">3. miejsce</div>
                                <div style="font-weight: bold; margin-top: 5px;">${raceResults[2].driver}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function showStandings() {
            const table = document.getElementById('standingsTable');
            table.innerHTML = '<tr><th>Poz.</th><th>Kierowca</th><th>Zespół</th><th>Punkty</th></tr>';
            standings.forEach(driver => {
                const row = document.createElement('tr');
                row.innerHTML = `<td><strong>${driver.pos}</strong></td><td>${driver.driver}</td><td>${driver.team}</td><td class="points">${driver.points}</td>`;
                table.appendChild(row);
            });
        }

        window.addEventListener('load', () => {
            initRacesList();
            showLatestResults();
        });

        window.onclick = (event) => {
            const modal = document.getElementById('resultsModal');
            if (event.target === modal) closeModal();
        };
    </script>
</body>
</html>
